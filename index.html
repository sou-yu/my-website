<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>横浜3日間トリップ</title>
    <meta
      name="description"
      content="横浜3日間旅行の移動、観光地、地図、電車詳細をまとめたスマホ向けWebアプリ"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=Outfit:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="hero-kicker">Yokohama Travel Companion</p>
        <h1>横浜3日間トリップ</h1>
        <p class="hero-copy">
          2025年3月28日から3月30日までの旅程を、地図・時系列・観光地情報・電車移動でまとめたスマホ用ガイドです。
        </p>
        <div class="hero-meta">
          <span>3/28 Fri - 3/30 Sun</span>
          <span>横浜 / 鎌倉 / 八景島</span>
        </div>
      </header>

      <nav class="day-tabs" aria-label="旅行日切替" id="day-tabs"></nav>

      <main id="app"></main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
